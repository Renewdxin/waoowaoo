name: task-state-guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  task-state-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate task state unification guard
        run: bash scripts/guards/task-state-unification-guard.sh

      - name: Validate task status cutover audit
        run: bash scripts/guards/task-status-cutover-audit.sh
