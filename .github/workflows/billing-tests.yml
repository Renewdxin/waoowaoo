name: billing-tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  billing-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run billing test suite
        run: npm run test:billing

      - name: Upload billing coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: billing-coverage
          path: coverage/billing
