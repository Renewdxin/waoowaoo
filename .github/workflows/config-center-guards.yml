name: config-center-guards

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  config-center-guards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run config center guards
        run: npm run check:config-center-guards
